name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build release assets
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        run: VERSION=${{ github.event.release.tag_name }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make release-package

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: remote-notes-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/remote-notes-server-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            dist/remote-notes-server-${{ github.event.release.tag_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload assets to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
